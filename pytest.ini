[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: tests that sleep or run heavy concurrency (deselect with '-m "not slow"')
addopts = -ra --tb=short
